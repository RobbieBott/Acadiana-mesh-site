<section class="subscribe-section">
  <div class="container">
    <h2>Stay Connected</h2>
    <p>Keep up with network growth, events, projects, and community news.</p>
    <form method="post" action="https://mail.acadianamesh.com/subscription/form" class="listmonk-form">
      <input type="hidden" name="nonce" />
      <input type="hidden" name="l" value="3519b3bd-ecc8-4266-84f0-6723df7ff02d" />
      <div class="form-row">
        <input type="text" name="name" placeholder="Name (optional)" />
        <input type="email" name="email" required placeholder="E-mail" />
        <input type="tel" name="attribs[phone]" placeholder="(555) 555-5555" id="phone-input" maxlength="14" autocomplete="tel" />
        <button type="submit" id="subscribe-btn">Subscribe</button>
      </div>
      <altcha-widget id="altcha" challengeurl="https://mail.acadianamesh.com/api/public/captcha/altcha"></altcha-widget>
      <script type="module" src="https://mail.acadianamesh.com/public/static/altcha.umd.js" async defer></script>
    </form>
  </div>
  <script>
    // Phone formatting
    document.getElementById('phone-input').addEventListener('input', function(e) {
      let val = e.target.value.replace(/\D/g, '').substring(0, 10);
      if (val.length >= 6) {
        val = '(' + val.substring(0,3) + ') ' + val.substring(3,6) + '-' + val.substring(6);
      } else if (val.length >= 3) {
        val = '(' + val.substring(0,3) + ') ' + val.substring(3);
      } else if (val.length > 0) {
        val = '(' + val;
      }
      e.target.value = val;
    });

    // Wait for ALTCHA to verify before allowing submit
    window.addEventListener('load', function() {
      const altcha = document.getElementById('altcha');
      const btn = document.getElementById('subscribe-btn');

      if (!altcha || !btn) return;

      // Disable button until altcha is verified
      btn.disabled = true;
      btn.textContent = 'Loading...';
      btn.style.opacity = '0.6';

      altcha.addEventListener('statechange', function(ev) {
        if (ev.detail && ev.detail.state === 'verified') {
          btn.disabled = false;
          btn.textContent = 'Subscribe';
          btn.style.opacity = '1';
        } else if (ev.detail && ev.detail.state === 'error') {
          btn.disabled = false;
          btn.textContent = 'Subscribe';
          btn.style.opacity = '1';
        }
      });

      // Fallback — enable after 5 seconds regardless
      setTimeout(function() {
        btn.disabled = false;
        btn.textContent = 'Subscribe';
        btn.style.opacity = '1';
      }, 5000);
    });
  </script>
</section>
