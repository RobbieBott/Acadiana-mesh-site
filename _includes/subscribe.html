<section class="subscribe-section">
  <div class="container">
    <h2>Stay Connected</h2>
    <p>Keep up with network growth, events, projects, and community news.</p>
    <form method="post" action="https://mail.acadianamesh.com/subscription/form" class="listmonk-form">
      <input type="hidden" name="nonce" />
      <input type="hidden" name="l" value="3519b3bd-ecc8-4266-84f0-6723df7ff02d" />
      <div class="form-row">
        <input type="text" name="name" placeholder="Name (optional)" />
        <input type="email" name="email" required placeholder="E-mail" />
        <input type="tel" name="attribs[phone]" placeholder="(555) 555-5555" id="phone-input" maxlength="14" autocomplete="tel" />
        <button type="submit">Subscribe</button>
      </div>
      <altcha-widget challengeurl="https://mail.acadianamesh.com/api/public/captcha/altcha"></altcha-widget>
      <script type="module" src="https://mail.acadianamesh.com/public/static/altcha.umd.js" async defer></script>
    </form>
  </div>
  <script>
    document.getElementById('phone-input').addEventListener('input', function(e) {
      let val = e.target.value.replace(/\D/g, '').substring(0, 10);
      if (val.length >= 6) {
        val = '(' + val.substring(0,3) + ') ' + val.substring(3,6) + '-' + val.substring(6);
      } else if (val.length >= 3) {
        val = '(' + val.substring(0,3) + ') ' + val.substring(3);
      } else if (val.length > 0) {
        val = '(' + val;
      }
      e.target.value = val;
    });
  </script>
</section>
